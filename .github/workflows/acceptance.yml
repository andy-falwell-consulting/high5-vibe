name: Acceptance (post-deploy)

# claude-code-action only supports automation events: workflow_dispatch,
# schedule, repository_dispatch, workflow_run (NOT push or deployment_status).
# So we chain off the auto-tag workflow, which runs on every versioned push to
# main (package.json bump). When it completes on main, we launch a Claude cloud
# agent that runs the acceptance checklist against the production URL and reports
# PASS/FAIL in the job summary.
#
# Also runnable on demand via the Actions "Run workflow" button.
# Requires repo secret: ANTHROPIC_API_KEY.

on:
  workflow_run:
    workflows: ["Auto-tag on version bump"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  acceptance:
    # Manual runs always; chained runs only for successful main builds.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run acceptance checklist with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running a fast post-deploy acceptance smoke for the Belay app.
            BASE_URL = https://db-livid.vercel.app

            Read .github/acceptance-checklist.md and execute every check against
            BASE_URL using curl + python3. Do NOT sleep or poll/wait — the deploy
            is already live; run the checks once and move on. Keep it quick.

            Print the PASS/FAIL summary table, append it to $GITHUB_STEP_SUMMARY
            (write the file path in that env var with python3), and end with the
            single line ACCEPTANCE: PASS or ACCEPTANCE: FAIL (n critical).
          claude_args: |
            --allowedTools "Bash(curl),Bash(python3),Read"
            --max-turns 15
            --model claude-sonnet-4-6
